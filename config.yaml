site:
  title: "Tech News & Learning Feeds"
  description: "Noticias tecnicas diarias por sistema para mantenerse actualizado"
  url: "https://patomvargas.github.io/capacitacion"
  language: "es"
  max_entries: 60  # dias de historial por feed

# Cuantos sistemas generar por dia (rota entre todos)
systems_per_day: 5

topics:
  - name: Google Workspace
    slug: google-workspace
    tags: [productividad, google, admin]
    focus: "Admin console, APIs, security, Vault, novedades de Workspace"
    sources: "workspaceupdates.googleblog.com OR support.google.com OR cloud.google.com"

  - name: FreeIPA
    slug: freeipa
    tags: [identidad, ldap, kerberos]
    focus: "Identity management, LDAP, Kerberos, trust relationships, HBAC, sudo rules"
    sources: "freeipa.org OR access.redhat.com OR github.com/freeipa"

  - name: DNS BIND9
    slug: bind9
    tags: [dns, redes, infraestructura]
    focus: "Configuracion de zonas, DNSSEC, views, RPZ, logging, performance tuning"
    sources: "isc.org OR kb.isc.org OR bind9.readthedocs.io"

  - name: OpenVPN
    slug: openvpn
    tags: [vpn, redes, seguridad]
    focus: "Tunneling, certificados, hardening, Access Server, site-to-site"
    sources: "openvpn.net OR community.openvpn.net OR github.com/OpenVPN"

  - name: Kubernetes
    slug: kubernetes
    tags: [containers, orquestacion, devops]
    focus: "Nuevas features de K8s, networking, storage, security, operators, troubleshooting"
    sources: "kubernetes.io OR github.com/kubernetes OR learnk8s.io"

  - name: OpenShift

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ topic.name }} - {{ config.site.title }}</title>
    <link rel="alternate" type="application/atom+xml" title="{{ topic.name }}" href="{{ base_url }}/feeds/{{ topic.slug }}.xml">
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #c9d1d9; --heading: #f0f6fc; --accent: #58a6ff;
            --code-bg: #1c2128; --muted: #8b949e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
            padding: 2rem 1rem; max-width: 800px; margin: 0 auto;
        }
        .back { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
        .back:hover { text-decoration: underline; }
        h1 { color: var(--heading); font-size: 1.4rem; margin: 1rem 0 0.25rem; }
        .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
        .rss-link { color: var(--accent); text-decoration: none; font-size: 0.85rem; }
        .article-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 0.6rem;
            transition: border-color 0.2s;
        }
        .article-item:hover { border-color: var(--accent); }
        .article-item .date { color: var(--muted); font-size: 0.8rem; }
        .article-item h3 { margin: 0.2rem 0; }
        .article-item h3 a { color: var(--accent); text-decoration: none; font-size: 0.95rem; }
        .article-item h3 a:hover { text-decoration: underline; }
        .article-item .summary { font-size: 0.85rem; color: var(--text); }
    </style>
</head>
<body>
    <a class="back" href="{{ base_url }}/">&larr; Inicio</a>
    <h1>{{ topic.name }}</h1>
    <p class="subtitle">{{ topic.focus }}</p>
    <p><a class="rss-link" href="{{ base_url }}/feeds/{{ topic.slug }}.xml">Suscribirse via RSS</a></p>

    {% for d in dates %}
    {% set news = archive[d] %}
    <div class="article-item">
        <span class="date">{{ d }}</span>
        <h3><a href="{{ base_url }}/archive/{{ topic.slug }}/{{ d }}.html">{{ news.title }}</a></h3>
        {% if news.summary %}<p class="summary">{{ news.summary }}</p>{% endif %}
    </div>
    {% endfor %}
</body>
</html>
